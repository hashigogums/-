<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>달려라 햄스터!</title>
    <style>
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); }
        body { margin:0; background-color:#2b2b2b; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; touch-action:none; }
        canvas { max-width:100vw; max-height:100vh; object-fit:contain; border:4px solid #D6B99A; border-radius:16px; background-color:#C3CF8B; touch-action:none; }
    </style>
</head>
<body>
<canvas id="gameCanvas" width="816" height="624"></canvas>

<audio id="bgm" src="bgm.mp3" loop></audio>
<audio id="sfxStart" src="start.mp3"></audio>
<audio id="sfxClick" src="click.mp3"></audio>
<audio id="sfxGameOver" src="gameover.mp3"></audio>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const bgm = document.getElementById('bgm');
    const sfxStart = document.getElementById('sfxStart');
    const sfxClick = document.getElementById('sfxClick');
    const sfxGameOver = document.getElementById('sfxGameOver');
    
    let isMuted = false;
    let audioUnlocked = false; // 🔥 오디오 락 해제 확인용 변수

    // 🔥 모바일 오디오 잠금 해제 함수
    function unlockAudio() {
        if (!audioUnlocked) {
            const sounds = [bgm, sfxStart, sfxClick, sfxGameOver];
            sounds.forEach(audio => {
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                }).catch(() => {});
            });
            audioUnlocked = true;
        }
    }

    let gameState = 'READY'; 
    // (이후 코드는 동일하게 유지하되, handleInput 함수를 수정합니다)
    // ... (중략: 기존 코드와 동일)

    const handleInput = (e) => {
        if(e.type === 'touchstart') e.preventDefault(); 
        
        // 🔥 클릭하는 즉시 오디오 잠금 해제 시도
        unlockAudio();

        // (이후 클릭 처리 로직 동일...)
        // 만약 gameState가 READY라면:
        if (gameState === 'READY') {
            gameState = 'START';
            if(!isMuted) bgm.play().catch(e => console.log(e));
            drawStaticScreen();
            return;
        }
        // ... (나머지 코드 생략: 기존 코드와 동일하게 붙여넣으세요)
    };

    // (나머지 코드 생략...)
</script>
</body>
</html>
